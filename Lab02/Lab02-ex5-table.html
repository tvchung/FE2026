<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Time Table</title>
</head>
<body>

<table border="1" cellpadding="10" cellspacing="0" align="center" width="500">
  <!-- Tiêu đề -->
  <tr bgcolor="red">
    <th colspan="6">Time Table</th>
  </tr>

  <!-- Hàng ngày trong tuần + cột Hours -->
  <tr>
    <th rowspan="6" bgcolor="yellow">Hours</th>
    <th>Mon</th>
    <th>Tue</th>
    <th>Wed</th>
    <th>Thu</th>
    <th>Fri</th>
  </tr>

  <!-- Tiết 1 -->
  <tr>
    <td>Science</td>
    <td>Maths</td>
    <td>Science</td>
    <td>Maths</td>
    <td>Arts</td>
  </tr>

  <!-- Tiết 2 -->
  <tr>
    <td>Social</td>
    <td>History</td>
    <td>English</td>
    <td>Social</td>
    <td>Sports</td>
  </tr>

  <!-- Lunch -->
  <tr bgcolor="green" style="color: white;">
    <th colspan="5">Lunch</th>
  </tr>

  <!-- Tiết 3 -->
  <tr>
    <td>Science</td>
    <td>Maths</td>
    <td>Science</td>
    <td>Maths</td>
    <td rowspan="2" align="center" valign="middle" 
    bgcolor="#05a742" style="color: yellow;">
    <b>Project</b></td>
  </tr>

  <!-- Tiết 4 -->
  <tr>
    <td>Social</td>
    <td>History</td>
    <td>English</td>
    <td>Social</td>
  </tr>
</table>

</body>
</html>
