<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo 4 div với 4 màu khác nhau - width, height</title>
    <style>
        div{
            width: 100px;
            height: 30px;
            border: 1px solid black;
            margin: 10px;
        }
         div:nth-child(1){
            background-color: red;
        }
         div:nth-child(2){
            background-color: green;
        }
         div:nth-child(3){
            background-color: blue;
        }
         div:nth-child(4){
            background-color: yellow;
        }
        div:hover{
             background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <div>div-1</div>
    <div>div-2</div>
    <div>div-3</div>
    <div>div-4</div>
</body>
</html>
