<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX - position</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color: greenyellow;
            position: relative;
        }
        .badge{
            width: 35px;
            height: 35px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
            top: 0;
            right:0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>
<body>
    <h1>BOX - position</h1>

   <div class="box">
        <span class="badge">NEW</span>
   </div>
</body>
</html>
