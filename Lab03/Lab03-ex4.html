<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo ảnh có chữ đè lên (overlay text)</title>
    <style>
        .card{
  width: 360px;
  height: 220px;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
}

.card img{
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.overlay{
  position: absolute;
  inset: 0;                 /* top right bottom left = 0 */
  background: rgba(0,0,0,.35);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  transition: .3s;
}

.content{
  color: #fff;
  opacity: .85;
  transform: translateY(10px);
  transition: .3s;
}

.card:hover .overlay{
  background: rgba(0,0,0,.6);
}

.card:hover .content{
  opacity: 1;
  transform: translateY(0);
}

.btn{
  display: inline-block;
  margin-top: 10px;
  padding: 8px 14px;
  background: rgba(255,255,255,.18);
  color: #fff;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,.35);
  border-radius: 8px;
}
    </style>
</head>
<body>
    <div class="card">
    <img src="https://picsum.photos/600/400" alt="demo">
    <div class="overlay">
        <div class="content">
        <h3>Du lịch Đà Nẵng</h3>
        <p>Biển xanh – nắng vàng – trải nghiệm tuyệt vời</p>
        <a href="#" class="btn">Xem thêm</a>
        </div>
    </div>
    </div>
</body>
</html>
