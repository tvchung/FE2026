        <a class="contact-item" href="tel:0978611889">
          <span class="icon" aria-hidden="true">📞</span>
          <span class="contact-text">
            <small>Hotline</small>
            <strong>0978 611 889</strong>
          </span>
        </a>

        <a class="contact-item" href="mailto:chungtrinhj@gmail.com">
          <span class="icon" aria-hidden="true">📧</span>
          <span class="contact-text">
            <small>Email</small>

          </span>
