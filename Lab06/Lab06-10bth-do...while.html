<!DOCTYPE html>
<html>

<head>
    <title>Vòng lặp do while</title>
</head>

<body>
    <h1>Ví dụ vòng lặp do...while</h1>
    <script>
        var number;
        do {
            number = prompt("Nhập một số tự nhiên (nhập 0 để kết thúc):");
            document.write("Bạn vừa nhập: " + number + "<br>");
        }
        while (number != 0);
        document.write("Chương trình kết thúc!");
    </script>
</body>

</html>
