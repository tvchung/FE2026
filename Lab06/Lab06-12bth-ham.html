<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Javascript</title>
</head>

<body>
    <h1>Function Javascript</h1>
    <script>
        document.write("<h3> Đây là một ví dụ về function trong JavaScript.<br>");
        function greet(name) {
            document.write("Xin chào,  " + name + "!<br>");
        }

        function add(a, b) {
            return a + b;
        }

        greet("Chung Trịnh");

        var total = add(5, 10);

        document.write("Tổng = " + total);

    </script>
</body>

</html>
