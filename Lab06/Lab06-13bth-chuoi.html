<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuỗi trong JavaScript</title>
    <style>
        p{
            font-size: 1.5rem;
            color: green;
        }
    </style>
</head>

<body>
    <h1>Chuỗi trong JavaScript</h1>
    <script>

        var text = "Hoc Lap Trinh JavaScript tại Devmaster";

        document.write("<p>Chuỗi ban đầu: " + text + "<br><br>");
        /* Độ dài chuỗi */
        document.write("Độ dài chuỗi: " + text.length + "<br>");
        /* Chuyển sang chữ hoa */
        document.write("Chữ hoa: " + text.toUpperCase() + "<br>");
        /* Chuyển sang chữ thường */
        document.write("Chữ thường: " + text.toLowerCase() + "<br>");
        /* Tìm vị trí từ */
        document.write("Vị trí chữ 'Trinh': " + text.indexOf("Trinh") + "<br>");
        /* Cắt chuỗi */
        document.write("Cắt chuỗi (0-7): " + text.substring(0, 7) + "<br>");
        /* Thay thế chuỗi */
        document.write("Thay thế: " + text.replace("JavaScript", "ReactJS") + "<br>");
        /* Tách chuỗi */
        var words = text.split(" ");
        document.write("Sau khi tách chuỗi: <br>");
        for (var i = 0; i < words.length; i++) {
            document.write(words[i] + "<br>");
        }
    </script>
</body>

</html>
