<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giải phương trình bậc nhất</title>
    <style>
        h1 {
            color: green;
        }
        h2 {
            color: red;
        }
        form div {
            margin-bottom: 10px;
        }
        input[type="number"] {
            width: 10rem;
            border: 1px solid #999;
            padding: .45rem;
        }
        input[type="submit"] {
            padding: .5rem 1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }   
    </style>
</head>
<body>
    <div>
        <h1>Giải phương trình bậc nhất</h1>
        <p>Phương trình bậc nhất có dạng: ax + b = 0</p>
        <form name="frm" action="" method="post">
            <div>
                <label for="a">Hệ số a:</label>
                <input type="number" id="a" name="a" size="5">
            </div>
            <div>
                <label for="b">Hệ số b:</label>
                <input type="number" id="b" name="b" size="5">
            </div>
            <input type="submit" value="Giải phương trình" 
                onclick="giaiPTBacNhat(); return false;" >
            <div id="ketqua"></div>
        </form>
        <script>
            function giaiPTBacNhat() {   
                var a = parseFloat(frm.a.value);
                var b = parseFloat(frm.b.value);

                if (a === 0) {
                    if (b === 0) {
                        document.getElementById("ketqua").innerHTML =    "<h2>Phương trình có vô số nghiệm.</h2>";
                    } else {
                        document.getElementById("ketqua").innerHTML = "<h2>Phương trình vô nghiệm.</h2>";
                    }
                } else {
                    var x = -b / a;
                    document.getElementById("ketqua").innerHTML = "<h2>Nghiệm của phương trình là: x = " + x + "</h2>";
                }
            }
        </script>
    </div>
</body>
</html>
