<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lệnh rẽ nhánh if</title>
    <style>
        h2 {
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Lệnh rẽ nhánh if</h1>
    <script>
        var age = parseInt(prompt("Nhập tuổi của bạn:"));

        if (age >= 18) {
            document.write("<h2>Bạn đã đủ tuổi để lái xe.</h2>");
        } else {
            document.write("<h2>Bạn chưa đủ tuổi để lái xe.</h2>");
        }
    </script>
</body>
</html>
