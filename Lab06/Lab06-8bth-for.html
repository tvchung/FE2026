<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng lặp for - In các số từ 1 → 10</title>
</head>
<body>
    <h1>Vòng lặp for - In các số từ 1 → 10</h1>
    <hr>
    <script>
        for (var i = 1; i <= 10; i++) {
            document.write(i + "<br>");
        }
    </script>
</body>
</html>
