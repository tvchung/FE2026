<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng lặp while (In các số từ 1 → 10)</title>
</head>
<body>
    <h1>Vòng lặp while (In các số từ 1 → 10)</h1>
    <hr>
    <script>
        var i = 1;
        while (i <= 10) {
            document.write(i + "; ");
            i++;
        }
    </script>
</body>
</html>
