<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực hiện các phép tính toán</title>
    <style>
        form {
            width: 300px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid green;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        div {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            position: relative;
            justify-content: center;
        }
        input[type="text"],
        input[type="password"] {
            padding: 10px;
            box-sizing: border-box;
            border-radius: 999px;
            border: 1px solid green;
            width: 100%;
        }
        button{
            padding: 10px 20px;
            margin: 0 5px;
            background-color: #4CAF50;
            color: yellow;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
        }
        input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
        }
         button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <form action="">
        <h1>Thực hiện các phép tính toán</h1>
        <div>
            <input type="text" id="username" name="username" placeholder="Nhập số a:">
        </div>
        <div>
            <input type="text" id="password" name="password" placeholder="Nhập số b:">
        </div>
        <div>
            <button>+</button>
            <button>-</button>
            <button>*</button>
            <button>/</button>
            <button>%</button>
        </div>
        <div>
            <input type="text" id="result" name="result" placeholder="Kết quả:">
        </div>
    </form>
</body>
</html>
