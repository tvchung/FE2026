<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực hiện các phép tính toán</title>
    <style>
        form {
            width: 300px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid green;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        div {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            position: relative;
            justify-content: center;
        }
        input {
            padding: 10px;
            box-sizing: border-box;
            border-radius: 999px;
            border: 1px solid green;
            width: 100%;
        }
        button{
            padding: 10px 20px;
            margin: 0 5px;
            background-color: #4CAF50;
            color: yellow;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            border-radius: 999px;
        }
        input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
        }
         button:hover {
            background-color: #45a049;
            border-radius: 999px;
        }
    </style>
</head>
<body>
    <form action="">
        <h1>Tính số ngày</h1>
        <div>
            <input type="number" id="thang" name="thang" placeholder="Nhập tháng:">
        </div>
        <div>
            <input type="number" id="nam" name="nam" placeholder="Nhập năm:">
        </div>
        <div>
            <button>Tính số ngày</button>
        </div>
        <div>
            <input type="text" id="result" name="result" placeholder="Kết quả:">
        </div>
    </form>
    <script>
        function tinhSoNgay(thang, nam) {
            var daysInMonth = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
            if (isLeapYear(nam)) {
                daysInMonth[1] = 29;
            }
            return daysInMonth[thang - 1];
        }

        function isLeapYear(year) {
            return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
        }   
        document.querySelector("button").addEventListener("click", function(event) {
            event.preventDefault();
            var thang = parseInt(document.getElementById("thang").value);
            var nam = parseInt(document.getElementById("nam").value);
            var result = tinhSoNgay(thang, nam);
            document.getElementById("result").value = "Tháng " + thang + " năm " + nam + " có " + result + " ngày.";
        });
    </script>
</body>
</html>
