<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 2rem;
        }
    </style>
</head>

<body>

    <script>

        for (var i = 0; i <= 9; i++) {

            for (var j = 0; j <= i; j++) {
                document.write(j);
            }

            document.write("<br>");

        }

    </script>
    <hr>
    <script>
        var m=9;
        for (var i = 0; i <= m; i++) {
            for (var j = 0; j < i; j++) {
                document.write("&nbsp;&nbsp;");
            }
            for (var j = 0; j <= m-i; j++) {
                document.write(j);
            }

            document.write("<br>");

        }
    </script>
    <hr>
    <script>
        var n=9;
        for (var i = 0; i <= n; i++) {
            for (var j = 0; j < n-i; j++) {
                document.write("&nbsp;&nbsp;");
            }
            for (var j = 0; j <= i; j++) {
                document.write(j);
            }

            document.write("<br>");

        }
    </script>
    <hr>
    <script>
        var m=9;
        for (var i = 0; i <= m; i++) {
            
            for (var j = 0; j <= m-i; j++) {
                document.write(j);
            }
            for (var j = 0; j < i; j++) {
                document.write("&nbsp;&nbsp;");
            }
            document.write("<br>");

        }
    </script>
</body>

</html>
