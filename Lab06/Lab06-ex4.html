<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 2rem;
        }
    </style>
</head>

<body>
    <hr>
    <script>
        var n=9;
        for (var i = 0; i <= n; i++) {
            for (var j = 0; j < n-i; j++) {
                document.write("&nbsp;&nbsp;&nbsp;");
            }
            for (var j = 0; j <= i; j++) {
                document.write(j + "&nbsp");
            }
            for (var j = i-1; j >= 0; j--) {
                document.write(j + "&nbsp");
            }
            document.write("<br>");

        }
    </script>
    <hr>
    
</body>

</html>
