<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ danh sách (List)</title>
</head>
<body>
    <h1>Thẻ danh sách (List)</h1>
    <hr/>
    <h2>Danh sách có thứ tự (Ordered List)</h2>
    <ol type="I" start="2">
        <li>Cài VS Code</li>
        <li>Tạo file index.html</li>
        <li>Chạy Live Server</li>
    </ol>
    <h2>Danh sách không thứ tự (Unordered List)</h2>
    <ul type="square">
        <li>HTML5</li>
        <li>CSS3</li>
        <li>JavaScript</li>
    </ul>
</body>
</html>
