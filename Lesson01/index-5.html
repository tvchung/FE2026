<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ ngữ nghĩa HTML5 (Semantic)</title>
    <style>
        header, nav, main, section, article, aside, footer {
            border: 1px solid rgb(2, 53, 25);
            padding: 10px; margin: 5px;
        }
    </style>
</head>
<body>
    <header>
        <img src="images/logo-devmaster.png" alt="Devmaster" width="100">
    </header>
    <nav>Menu</nav>
    <main>
        <section>
            <article>Nội dung bài viết</article>
        </section>
        <aside>Sidebar</aside>
    </main>
    <footer>Footer</footer>
</body>
</html>
