<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form with Textarea</title>
</head>
<body>
    <form action="">
        <textarea rows="5" placeholder="Nhập nội dung ở đây..."></textarea>
    </form>

    <style>
    form { width: 100%; }
    textarea{
        width: 100%;
        box-sizing: border-box; /* tính cả padding + border trong 100% */
        padding: 10px;
        resize: vertical;       /* chỉ cho kéo dọc (tuỳ chọn) */
    }
    </style>

</body>
</html>
