<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css tương tác với tên class của thẻ html</title>
    <style>
        .tieu-de {
            color: red;
            text-align: center;
        }
        .noi-dung {
            font-size: 1rem;
            color: #ddd;
        }
    </style>
</head>
<body>
    <h1 class="tieu-de">Css tương tác với tên class của thẻ html</h1>
    <p class="noi-dung">Nội dung sử dụng class .noi-dung</p>
</body>
</html>
