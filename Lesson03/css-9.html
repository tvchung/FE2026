<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màu theo hệ thập lục phân - HEX</title>
    <style>
        .box {
            width: 180px;
            height: auto;
            color: #cbeb16;
            background-color: #1db55f;
            padding: 1rem;
            text-align: center;
            vertical-align: middle;
            border: 3px solid yellow;
            border-radius: .5rem;
        }
        
        .box-1 {
            width: 250px;
            height: auto;
            color: rgb(203, 235, 22);
            background-color: rgb(29, 181, 95);
            padding: 1rem;
            text-align: center;
            vertical-align: middle;
            border: 3px solid yellow;
            border-radius: .5rem;
        }


        .box-2 {
            width: 180px;
            height: auto;
            color: yellow;
            background-color: green;
            padding: 1rem;
            text-align: center;
            vertical-align: middle;
            border: 3px solid yellow;
            border-radius: .5rem;
        }

    </style>
</head>
<body>
    <div class="box">
        <h1>Màu theo hệ thập lục phân - HEX</h1>
    </div>
    <br>

    <div class="box-1">
        <h1>Màu theo kết hợp màu RGB
            <pre><code>rgb(203, 235, 22)</code></pre>
        </h1>
    </div>
    <br>
    <div class="box-2">
        <h1>Màu theo tên tiếng anh</h1>
        <p><code>color: yellow;</code></p>
    </div>
</body>
</html>
