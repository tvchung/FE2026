<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tích hợp Font (Typography nâng cao)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #333;
        }
        p {
            font-weight: 600;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Tích hợp Font (Typography nâng cao)</h1>
    <hr>
    <p>
        Trong phần này, chúng ta sẽ học cách tích hợp font vào trang web của mình để tạo ra một thiết kế đẹp mắt và chuyên nghiệp hơn. Việc sử dụng font phù hợp có thể làm tăng trải nghiệm người dùng và giúp truyền đạt thông điệp một cách hiệu quả hơn.
    </p>
</body>
</html>
