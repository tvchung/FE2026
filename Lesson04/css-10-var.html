<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS variables – Ví dụ</title>
    <style>
        :root {
            --bg-color: white;
            --text-color: black;
        }
        body{
            background: var(--bg-color);
            color: var(--text-color);
        }
        .dark{
            --bg-color: black;
            --text-color: white;
        }
    </style>

</head>
<body>
    <h1>CSS variables – Ví dụ</h1>
    <button onclick="document.body.classList.toggle('dark')">
        Toggle Dark Mode
    </button>
</body>
</html>
