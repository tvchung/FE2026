<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform - flip 3D (Lật thẻ như ATM) </title>
    <style>
        .flip-container{
            perspective: 1000px;
        }
        .flip-card{
            width: 200px;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            border: 1px solid black;
        }
        .flip-card:hover{
            transform: rotateY(180deg);
            cursor: pointer;
        }
        .front, .back{
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .back{
            transform: rotateY(180deg);
        }
    </style>
</head>

<body>
    <h1>Transform - flip 3D (Lật thẻ như ATM)</h1>
    <hr />
    <div class="flip-container">
        <div class="flip-card">
            <div class="front">Front</div>
            <div class="back">Back</div>
        </div>
    </div>
</body>

</html>
