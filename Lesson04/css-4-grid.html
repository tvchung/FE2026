<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Layout</title>
    <style>
        .products {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .card {
            background: #06b35a;
            padding: 1rem;
            border-radius: .5rem;
            text-align: center;
            color: white;
        }
    </style>
</head>

<body>
    <h1>CSS Grid Layout</h1>
    <hr>
    <div class="products">
        <div class="card">SP 1</div>
        <div class="card">SP 2</div>
        <div class="card">SP 3</div>
        <div class="card">SP 4</div>
        <div class="card">SP 5</div>
        <div class="card">SP 6</div>
    </div>
</body>

</html>
