<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Layout</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 1rem;
        }
        .box1{
            grid-column: 1 / 3;
        }
        .box2{
            grid-row: 1 / 3;
        }
        .box3{
            grid-column: 2 / 4;
            grid-row: 1 / 2;
        }
    </style>
</head>

<body>
    <h1>CSS Grid Lines</h1>
    <hr>
    <div class="container">
        <div class="box box1">Box 1</div>
        <div class="box box2">Box 2</div>
        <div class="box box3">Box 3</div>
    </div>
</body>

</html>
