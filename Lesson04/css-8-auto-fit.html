<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop-first</title>
    <style>
        .products{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        .card {
            background: #06b35a;
            padding: 1rem;
            border-radius: .5rem;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>
    <section>
        <h1> <b>Desktop-first là gì?:</b> </h1>
        <p> Viết CSS cho desktop trước, sau đó thu nhỏ xuống tablet/mobile bằng max-width.</p>
    </section>
    <section class="products">
        <div class="card">SP 1</div>
        <div class="card">SP 2</div>
        <div class="card">SP 3</div>
        <div class="card">SP 4</div>
        <div class="card">SP 5</div>
        <div class="card">SP 6</div>
    </section>
</body>
</html>
