<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition tạo hiệu ứng chuyển đổi mượt khi một thuộc tính CSS thay đổi.</title>
    <style>
        button{
            background: blue;
            color: white;
            transition: background 3s ease;
            padding: 1rem;
            border-radius: .5rem;
            border: none;
        }

        button:hover{
            background: red;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Transition tạo hiệu ứng chuyển đổi mượt khi một thuộc tính CSS thay đổi.</h1>
    <button title="Hover">Transition</button>
</body>
</html>
