<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Events Example</title>
</head>
<body>
    <h2 id="title">Ví dụ DOM Event</h2>
    <!-- Click Event -->
    <button id="btnClick">Click me</button>
    <br><br>
    <!-- Mouse Event -->
    <p id="hoverText">Di chuột vào đây</p>
    <br>
    <!-- Keyboard Event -->
    <input type="text" id="nameInput" placeholder="Nhập tên của bạn">
    <p id="result"></p>
    <br>
    <!-- Change Event -->
    <select id="colorSelect">
        <option value="">Chọn màu</option>
        <option value="red">Đỏ</option>
        <option value="blue">Xanh</option>
        <option value="green">Lá</option>
    </select>

    <script src="js/event-1.js"></script>
</body>
</html>
